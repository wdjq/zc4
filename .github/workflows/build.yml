name: Build License Shell

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Build Tools
        run: |
          sdkmanager "build-tools;30.0.3" "platforms;android-21"
          mkdir -p tools android-sdk
          # 下载 android.jar（用于编译）
          curl -L -o android-sdk/android.jar https://github.com/Sable/android-platforms/raw/master/android-21/android.jar
          # 下载 baksmali
          curl -L -o tools/baksmali.jar https://bitbucket.org/JesusFreke/smali/downloads/baksmali-2.5.2.jar
      
      - name: Compile Java
        run: |
          mkdir -p build/classes build/smali
          # 编译
          javac -source 1.7 -target 1.7 -bootclasspath android-sdk/android.jar -d build/classes src/LicenseActivity.java
          # 使用 SDK 自带的 d8（支持 --release）
          $ANDROID_SDK_ROOT/build-tools/30.0.3/d8 \
            build/classes/com/license/shell/*.class \
            --output build/ \
            --min-api 21 \
            --release || \
          $ANDROID_SDK_ROOT/build-tools/30.0.3/dx \
            --dex --output=build/classes.dex build/classes/
          # 找到生成的 dex
          if [ -f "build/classes.dex" ]; then DEX_FILE="build/classes.dex"; else DEX_FILE=$(find build -name "*.dex" | head -1); fi
          echo "Using DEX: $DEX_FILE"
          # 转为 Smali
          java -jar tools/baksmali.jar d $DEX_FILE -o build/smali/
      
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c
      
      - name: Build SO
        run: |
          for abi in armeabi-v7a arm64-v8a x86_64; do
            mkdir -p build/$abi
            cmake -B build/$abi -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=$abi -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-fvisibility=hidden -O3 -fno-stack-protector" -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--strip-all -s"
            cmake --build build/$abi
          done
          mkdir -p output_so
          cp build/armeabi-v7a/liblicense_core.so output_so/armeabi-v7a.so
          cp build/arm64-v8a/liblicense_core.so output_so/arm64-v8a.so
          cp build/x86_64/liblicense_core.so output_so/x86_64.so
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            build/smali/
            output_so/
            scripts/

  release:
    needs: build-all
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: artifacts
      - name: Package
        run: |
          mkdir -p release/smali release/so release/tools
          cp -r artifacts/build/smali/* release/smali/
          cp artifacts/output_so/*.so release/so/
          cp scripts/*.py release/tools/
          echo "使用指南：" > release/README.txt
          echo "1. python patch_so.py so/arm64-v8a.so KEY com.yourapp.MainActivity" >> release/README.txt
          echo "2. 合并smali和so" >> release/README.txt
          echo "3. 修改入口Activity" >> release/README.txt
          cd release && zip -r ../license-shell-${{ github.ref_name }}.zip .
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: license-shell-${{ github.ref_name }}.zip
          body: 专用版，含Smali和SO文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
