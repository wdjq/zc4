name: Build License Shell

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  prepare-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Download Tools
        run: |
          mkdir -p tools android-sdk/platforms/android-21
          wget -q --timeout=30 https://raw.githubusercontent.com/LexaGuru/Smali-Builder/main/dx.jar -O tools/dx.jar || true
          wget -q --timeout=30 https://github.com/Sable/android-platforms/raw/master/android-21/android.jar -O android-sdk/platforms/android-21/android.jar || true
          wget -q --timeout=30 https://bitbucket.org/JesusFreke/smali/downloads/baksmali-2.5.2.jar -O tools/baksmali.jar || true
      - name: Compile Java
        run: |
          mkdir -p build/classes build/smali
          if [ -f "android-sdk/platforms/android-21/android.jar" ]; then
            javac -source 1.8 -target 1.8 -bootclasspath android-sdk/platforms/android-21/android.jar -d build/classes src/LicenseActivity.java
            if [ -f "tools/dx.jar" ]; then
              java -jar tools/dx.jar --dex --output=build/classes.dex build/classes/com/license/shell/*.class || true
              if [ -f "tools/baksmali.jar" ] && [ -f "build/classes.dex" ]; then
                java -jar tools/baksmali.jar d build/classes.dex -o build/smali || true
              fi
            fi
          fi
          mkdir -p build/smali/com/license/shell
      - name: Upload Java
        uses: actions/upload-artifact@v4
        with:
          name: java-artifacts
          path: build/smali/
          if-no-files-found: warn

  build-native:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c
      - name: Build SO
        run: |
          mkdir -p build/${{ matrix.abi }}
          cmake -B build/${{ matrix.abi }} -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=${{ matrix.abi }} -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-fvisibility=hidden -O3 -fno-stack-protector" -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--strip-all -s"
          cmake --build build/${{ matrix.abi }}
      - name: Rename SO
        run: |
          mkdir -p output_so
          cp build/${{ matrix.abi }}/liblicense_core.so output_so/${{ matrix.abi }}.so
      - name: Upload SO
        uses: actions/upload-artifact@v4
        with:
          name: so-${{ matrix.abi }}
          path: output_so/${{ matrix.abi }}.so

  release:
    needs: [prepare-java, build-native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Package
        run: |
          mkdir -p release/java release/so release/tools
          cp -r artifacts/java-artifacts/* release/java/ 2>/dev/null || true
          cp artifacts/so-arm64-v8a/arm64-v8a.so release/so/ 2>/dev/null || true
          cp artifacts/so-armeabi-v7a/armeabi-v7a.so release/so/ 2>/dev/null || true
          cp artifacts/so-x86_64/x86_64.so release/so/ 2>/dev/null || true
          cp scripts/*.py release/tools/ 2>/dev/null || true
          echo "使用指南：" > release/README.txt
          echo "1. python tools/patch_so.py so/arm64-v8a.so KEY com.yourapp.MainActivity" >> release/README.txt
          echo "2. 放入SO到lib/arm64-v8a/liblicense_core.so" >> release/README.txt
          echo "3. Smali放入smali/com/license/shell/" >> release/README.txt
          echo "4. 修改AndroidManifest.xml入口" >> release/README.txt
          cd release && zip -r ../license-shell-${{ github.ref_name }}.zip .
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: license-shell-${{ github.ref_name }}.zip
          body: 专用版，含Smali和SO文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
