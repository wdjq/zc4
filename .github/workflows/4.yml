name: Build  (Auto Config)

on:
  workflow_dispatch:
    inputs:
      key_value:
        description: 'Key数值 (3-10位数字)'
        required: true
        default: '123'
      target_activity:
        description: '目标Activity完整路径'
        required: true
        default: 'com.yourpackage.license.MainActivity'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install NDK & CMake
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        sdkmanager --install "cmake;3.22.1"

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
        
    - name: Build Release
      run: ./gradlew assembleRelease

    - name: Auto inject config into SO
      shell: python
      run: |
        import struct
        import os
        
        # 从workflow输入获取配置
        key = "${{ github.event.inputs.key_value }}"
        activity = "${{ github.event.inputs.target_activity }}"
        
        print(f"[*] Injecting Key: {key}")
        print(f"[*] Injecting Activity: {activity}")
        
        # 验证长度
        if not (3 <= len(key) <= 10):
            raise ValueError(f"Key长度{len(key)}必须在3-10之间")
        if not (10 <= len(activity) <= 50):
            raise ValueError(f"Activity长度{len(activity)}必须在10-50之间")
        
        # 加密算法（与Native decrypt_config对应）
        CFG_KEY_BASE = 0x3C
        CFG_MIX = 0xA5
        
        def encrypt(data):
            return bytes(b ^ CFG_MIX ^ CFG_KEY_BASE ^ (i & 0x0F) for i, b in enumerate(data))
        
        # 组装数据
        plaintext = key.encode() + b'\x00' + activity.encode() + b'\x00'
        data_len = len(plaintext)
        encrypted = encrypt(plaintext)
        
        # 构建128字节配置块
        config = bytearray(128)
        struct.pack_into('<I', config, 0, data_len)  # 4字节长度头
        config[4:4+len(encrypted)] = encrypted
        
        # 填充随机数据（防识别）
        import random
        for i in range(4+len(encrypted), 128):
            config[i] = random.randint(0x00, 0xFF)
        
        # 写入所有架构的SO文件
        base_path = "app/build/intermediates/cmake/release/obj"
        archs = ["arm64-v8a", "armeabi-v7a", "x86", "x86_64"]
        injected = []
        
        for arch in archs:
            so_path = os.path.join(base_path, arch, "liblicense.so")
            if os.path.exists(so_path):
                with open(so_path, 'r+b') as f:
                    f.seek(0x2000)  # 配置区固定偏移
                    f.write(config)
                print(f"[+] Injected into {arch}")
                injected.append(arch)
        
        if not injected:
            raise FileNotFoundError("未找到任何SO文件")
        
        print(f"[*] 完成注入架构: {', '.join(injected)}")

    - name: Repack APK with modified SO
      run: |
        # 创建临时目录
        mkdir -p apk_repack
        cd apk_repack
        
        # 解压APK
        unzip -q ../app/build/outputs/apk/release/app-release-unsigned.apk
        
        # 替换SO文件（上一步已修改）
        # 无需操作，因为SO文件已被直接修改
        
        # 重新打包（不压缩SO，保持性能）
        zip -rq0 ../app-configured.apk .
        cd ..

    - name: Upload final APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-configured
        path: app-configured.apk
        retention-days: 1

    - name: Upload modified SO files (for verification)
      uses: actions/upload-artifact@v4
      with:
        name: native-libraries-modified
        path: app/build/intermediates/cmake/release/obj/**/liblicense.so
        retention-days: 1
