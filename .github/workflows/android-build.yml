name: Android Unsigned Release Build
# 触发条件：推送v开头的标签触发（如v1.0.0），也可修改为push到main分支触发
on:
  push:
    tags:
      - 'v*'

# 全局环境变量，与gradle配置完全对齐
env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: '34.0.0'
  NDK_VERSION: '25.1.8937393'
  CMAKE_VERSION: '3.22.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出项目代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 配置JDK环境，与gradle的Java 17完全匹配
      - name: Set Up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle' # 缓存gradle依赖，大幅提升构建速度

      # 3. 配置Android SDK、NDK、CMake环境
      - name: Set Up Android Build Environment
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: |
            platforms;android-${{ env.ANDROID_COMPILE_SDK }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}

      # 4. 构建无签名Release包
      - name: Build Unsigned Release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      # 5. 上传构建产物，严格保留1天，到期自动删除
      - name: Upload Unsigned APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 1 # 产物仅保留1天，完全符合要求
          if-no-files-found: error # 构建失败无APK时直接抛出错误
