plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.yourpackage.license'
    compileSdk 34
    ndkVersion "25.1.8937393" // 与GitHub Actions环境一致
    ndkPath System.getenv("ANDROID_NDK_HOME") ?: "" // 从环境变量读取NDK路径

    defaultConfig {
        applicationId 'com.yourpackage.license'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'

        // NDK编译+防逆向优化
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++14 -frtti -fexceptions -fvisibility=hidden -O2 -s"
                arguments "-DANDROID_STL=c++_shared"
                abiFilters 'armeabi-v7a', 'arm64-v8a' // 主流架构
            }
        }

        buildFeatures {
            viewBinding true
            buildConfig false // 关闭无用特性
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // NDK+CMake构建配置
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    // 构建类型配置
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            debuggable false
            jniDebuggable false
        }
        debug {
            minifyEnabled false
            debuggable true
            jniDebuggable true
        }
    }

    // Lint配置，避免非关键错误阻断构建
    lint {
        abortOnError false
        checkReleaseBuilds false
        disable 'MissingTranslation', 'ExtraTranslation'
    }
}

// 修复后的依赖声明
dependencies {
    implementation libs.androidx.core
    implementation libs.androidx.appcompat
    implementation libs.material
    implementation libs.androidx.constraintlayout
    
    // 测试依赖：直接使用坐标，无Version Catalog依赖
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
